# Layer 1 pytest configuration (v3.1)
# 
# Suppress benign sklearn/scipy warnings from spectral embedding:
#   - "Graph is not fully connected" (UserWarning from sklearn)
#   - "k >= N for N * N square matrix" (RuntimeWarning from scipy/sklearn)
#
# These warnings appear when update_embedding() is called on small/disconnected
# relational graphs. The implementation handles these cases gracefully;
# the warnings are cosmetic only.
#
# Place this file at: apeiron/ (pytest rootdir) 
# OR at: apeiron/layers/ (if running from there)
[pytest]
# Layer 1 pytest configuration (v3.1)
# Suppress benign sklearn/scipy warnings from spectral embedding
asyncio_mode = strict
filterwarnings =
    ignore::UserWarning:sklearn.manifold.*
    ignore::RuntimeWarning:sklearn.manifold.*
    ignore:Graph is not fully connected:UserWarning
    ignore:k >= N for N:RuntimeWarning
    ignore:Attempting to use scipy.linalg.eigh:RuntimeWarning
    ignore::DeprecationWarning
    ignore::pydantic.PydanticDeprecatedSince20
    ignore::RuntimeWarning
env =
    OMP_NUM_THREADS=1